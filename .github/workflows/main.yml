name: StorySaga 3-Minute Pipeline

on:
  schedule:
    - cron: '30 7 * * *'  # Runs automatically at 1 PM IST (7:30 AM UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ImageMagick + ffmpeg
        run: sudo apt-get update && sudo apt-get install -y imagemagick ffmpeg
      - name: Allow ImageMagick text rendering
        run: sudo sed -i '/<policy domain="path" rights="none" pattern="@\*"/d' /etc/ImageMagick-6/policy.xml
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
          DRIVE_CLIPS_FOLDER_ID: ${{ secrets.DRIVE_CLIPS_FOLDER_ID }}
          DRIVE_MUSIC_FOLDER_ID: ${{ secrets.DRIVE_MUSIC_FOLDER_ID }}
          DRIVE_FONT_FILE_ID: ${{ secrets.DRIVE_FONT_FILE_ID }}
          DRIVE_EXPORT_FOLDER_ID: ${{ secrets.DRIVE_EXPORT_FOLDER_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVELY_API_KEY: ${{ secrets.TAVELY_API_KEY }}
        run: python main.py
      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/last_check.json
          git diff --staged --quiet || git commit -m "Update view tracking state"
          git pull --rebase origin main
          git push
